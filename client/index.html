<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArtJam — Art Platform</title>

    <!-- Polyfill for crypto.randomUUID (fixes browser extension issues) -->
    <script>
        if (!crypto.randomUUID) {
            crypto.randomUUID = function() {
                return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                    var r = Math.random() * 16 | 0;
                    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
                });
            };
        }
    </script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <!-- ===== NAVIGATION ===== -->
    <nav id="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <a href="#" onclick="navigateTo('home')">Art<span>Jam</span></a>
            </div>
            <div class="nav-links">
                <a href="#" onclick="navigateTo('home')">Discover</a>
                <a href="#" onclick="navigateTo('jams')">Jams</a>
                <a href="#" onclick="navigateTo('submit')" class="btn-nav-primary">Submit Art</a>
                <span id="auth-links">
                    <a href="#" onclick="navigateTo('login')">Log In</a>
                    <a href="#" onclick="navigateTo('register')" class="btn-nav-secondary">Sign Up</a>
                </span>
                <span id="user-links" style="display: none;">
                    <a href="#" onclick="navigateTo('profile', { id: getCurrentUser()?.id })" id="nav-username">Profile</a>
                    <a href="#" onclick="logoutUser()">Logout</a>
                </span>
            </div>
        </div>
    </nav>

    <!-- ===== MAIN CONTENT ===== -->
    <main id="app">
        <div id="page-content"></div>
    </main>

    <!-- ===== FOOTER ===== -->
    <footer>
        <div class="footer-container">
            <p>&copy; 2026 ArtJam — built with <span>♥</span></p>
        </div>
    </footer>

    <!-- ===== JAVASCRIPT ===== -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
